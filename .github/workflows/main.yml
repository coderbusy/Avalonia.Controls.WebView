name: CICD

on:
  push:
    branches: [ "main", "release/*" ]
    tags:
      - '*'
  pull_request:
      branches: [ "main" ]
  workflow_dispatch: # manual trigger for stable release
    inputs:
      nuget:
          description: 'Push NuGet'
          required: true
          type: boolean
          default: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
          # https://github.com/actions/checkout/issues/116#issuecomment-644419389
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: 'recursive'
    - uses: actions/setup-dotnet@v4
      with:
          dotnet-version: '9.0.305'

    - name: Install workloads
      run: dotnet workload install android --version 9.0.305

    - name: CreateNugetPackages
      run: dotnet run --project ${{github.workspace}}/build/_build.csproj -- --target CreateNugetPackages --configuration Release --output ${{github.workspace}}/artifacts/packages/

    - name: Upload Avalonia nupkg artifact
      uses: actions/upload-artifact@v4
      with:
        name: avalonia
        path: ${{github.workspace}}/artifacts/packages/Avalonia.Controls.WebView.*.nupkg
        retention-days: 1
    - name: Upload XPF nupkg artifact
      uses: actions/upload-artifact@v4
      with:
          name: xpf
          path: ${{github.workspace}}/artifacts/packages/Avalonia.Xpf.Controls.WebView.*.nupkg
          retention-days: 1

  publish-nightly-release:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && github.ref == 'refs/heads/main'
    steps:

      # Only publish nightly for Avalonia, not XPF 
      - uses: actions/download-artifact@v4
        with:
            name: avalonia
            path: ./nupkgs

      - name: Publish Nightly release
        run: dotnet nuget push ./nupkgs/**/*.nupkg --api-key ${{secrets.NIGHTLY_FEED_API_KEY}} --source https://nuget-feed-nightly.avaloniaui.net/v3/index.json

  publish-xpf-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:

    - name: Check branch validity
      if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
      run: |
          echo "Error: stable_release can only be run on 'release/*' branches."
          exit 1

    - uses: actions/download-artifact@v4
      with:
        name: xpf
        path: ./nupkgs

    - name: Publish XPF release
      if: ${{ inputs.nuget }}
      run: dotnet nuget push ./nupkgs/**/*.nupkg  --api-key ${{secrets.XPF_FEED_API_KEY}} --source https://xpf-nuget-feed.avaloniaui.net/push/v3/index.json

  publish-accelerate-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:

    - name: Check branch validity
      if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
      run: |
          echo "Error: stable_release can only be run on 'release/*' branches."
          exit 1

    - uses: actions/download-artifact@v4
      with:
        name: avalonia
        path: ./nupkgs

    - name: Publish release
      if: ${{ inputs.nuget }}
      run: dotnet nuget push ./nupkgs/**/*.nupkg --api-key ${{secrets.NUGET_FEED_API_KEY}} --source https://api.nuget.org/v3/index.json

